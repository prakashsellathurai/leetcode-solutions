# This is a basic workflow to help you get started with Actions

name: Page Build

# Controls when the action will run. 
on:
  workflow_run:
    workflows: ["Update Submodule"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.3.1
        with:
          token: ${{ secrets.LT_SUB }}
          submodules: recursive
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      - name: Fetch full submodule history
        run: git -C leetcode-submissions fetch --unshallow 2>/dev/null || true

      - name: Update .md files
        run: uv run ./scripts/createdocs.py

      - name: Generate Docs
        run: uv run sphinx-build -b dirhtml ./source/ ./docs

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
