name: Update Submodule

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the $default-branch branch
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'website/**'
      
  repository_dispatch:
    types: [new-leetcode-submissions]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  UpdateSubmodule:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@v2.3.1
        with:
          token: ${{ secrets.LT_SUB }}
          submodules: recursive
          
      - name: Pull submodule
        run: |
          git pull --recurse-submodules
          git submodule update --init --recursive --remote

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Install dependencies
        run: uv pip install -r ./requirements.txt

      - name: Fetch full submodule history
        run: git -C leetcode-submissions fetch --unshallow 2>/dev/null || true

      - name: Update submission cache and source files
        run: uv run ./scripts/createdocs.py

      - name: Push changes
        uses: EndBug/add-and-commit@v7
        with:
          default_author: github_actions
          
